name: Keep Supabase Awake

# ───────────────────────────────────────────────────────────────
#  Empêche la mise en pause du projet Supabase (plan gratuit).
#  Le projet se met en pause après 7 jours SANS activité.
#  Ce workflow envoie une petite requête de lecture tous les 2 jours
#  pour que le compteur d'inactivité ne tombe jamais à zéro.
#
#  La clé utilisée est la clé "anon" (publique, déjà présente dans
#  js/supabase.js et protégée par les politiques RLS). Aucun secret
#  sensible n'est exposé ici.
# ───────────────────────────────────────────────────────────────

on:
  schedule:
    # Tous les 2 jours à 06:00 UTC. (Bien < 7 jours de marge.)
    - cron: '0 6 */2 * *'
  # Permet aussi de lancer le réveil manuellement depuis l'onglet Actions.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping des bases Supabase (production + dev)
        run: |
          PROD_URL="https://guhktnlmilhcmgeecdxn.supabase.co/rest/v1/sections?select=id&limit=1"
          PROD_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd1aGt0bmxtaWxoY21nZWVjZHhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI4NDc0MTIsImV4cCI6MjA5ODQyMzQxMn0.Gvu5Hv4BlvddYbvlSHEmP8Z5dxQmoSQ9GxvsitrQUdc"
          DEV_URL="https://znewlnioznrwqhigfcla.supabase.co/rest/v1/sections?select=id&limit=1"
          DEV_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpuZXdsbmlvem5yd3FoaWdmY2xhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI5Nzc3MjcsImV4cCI6MjA5ODU1MzcyN30.vrRDJG3BqSNp0i7nxbdUqHl0WHfQeaz4vv-15MM2MFQ"

          FAIL=0
          for ENTRY in "production:$PROD_URL:$PROD_KEY" "dev:$DEV_URL:$DEV_KEY"; do
            NAME="${ENTRY%%:*}"
            REST="${ENTRY#*:}"
            URL="${REST%%:*}"
            KEY="${REST#*:}"
            echo "Réveil de la base Supabase ($NAME)…"

            # Jusqu'à 3 tentatives — tolère les erreurs réseau/DNS transitoires du runner
            # (curl peut échouer avant même de recevoir une réponse HTTP, ex. code 6 = DNS).
            HTTP_CODE=""
            for TRY in 1 2 3; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --retry 2 --retry-delay 3 --max-time 20 \
                -H "apikey: $KEY" \
                -H "Authorization: Bearer $KEY" \
                "$URL" || echo "")
              if [ -n "$HTTP_CODE" ]; then break; fi
              echo "  ⏳ Tentative $TRY échouée (réseau/DNS), nouvel essai…"
              sleep 5
            done

            echo "  Code HTTP renvoyé : ${HTTP_CODE:-aucun (échec réseau)}"
            if [ -n "$HTTP_CODE" ] && [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
              echo "  ✅ Base $NAME active, ping réussi."
            else
              echo "  ❌ Réponse inattendue (${HTTP_CODE:-échec réseau}) pour $NAME — la base est peut-être en pause ou la table a changé."
              FAIL=1
            fi
          done
          exit $FAIL

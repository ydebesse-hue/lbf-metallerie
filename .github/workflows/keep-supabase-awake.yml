name: Keep Supabase Awake

# ───────────────────────────────────────────────────────────────
#  Empêche la mise en pause du projet Supabase (plan gratuit).
#  Le projet se met en pause après 7 jours SANS activité.
#  Ce workflow envoie une petite requête tous les 2 jours pour que
#  le compteur d'inactivité ne tombe jamais à zéro.
#
#  Requête volontairement SANS clé apikey/Authorization : diagnostiqué
#  le 23/07/2026 — les requêtes authentifiées (apikey + Bearer) émises
#  depuis les runners GitHub Actions échouent systématiquement sans
#  réponse (probable filtrage anti-bot Cloudflare sur ce pattern),
#  alors qu'une requête nue sur /rest/v1/ atteint bien la passerelle
#  Supabase et obtient une vraie réponse 401 "No API key found" —
#  cela suffit à compter comme activité pour la passerelle API.
# ───────────────────────────────────────────────────────────────

on:
  schedule:
    # Tous les 2 jours à 06:00 UTC. (Bien < 7 jours de marge.)
    - cron: '0 6 */2 * *'
  # Permet aussi de lancer le réveil manuellement depuis l'onglet Actions.
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping des bases Supabase (production + dev)
        run: |
          PROD_URL="https://guhktnlmilhcmgeecdxn.supabase.co/rest/v1/"
          DEV_URL="https://znewlnioznrwqhigfcla.supabase.co/rest/v1/"

          FAIL=0
          for ENTRY in "production:$PROD_URL" "dev:$DEV_URL"; do
            NAME="${ENTRY%%:*}"
            URL="${ENTRY#*:}"
            echo "Réveil de la base Supabase ($NAME)…"

            HTTP_CODE=""
            for TRY in 1 2 3; do
              HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 "$URL" || echo "")
              if [ -n "$HTTP_CODE" ] && [ "$HTTP_CODE" != "000" ]; then break; fi
              echo "  ⏳ Tentative $TRY échouée (réseau), nouvel essai…"
              sleep 5
            done

            echo "  Code HTTP renvoyé : ${HTTP_CODE:-aucun (échec réseau)}"
            # N'importe quelle vraie réponse HTTP (même 401 "no api key") prouve que
            # la passerelle Supabase a été atteinte — c'est tout ce qui compte ici.
            if [ -n "$HTTP_CODE" ] && [ "$HTTP_CODE" != "000" ]; then
              echo "  ✅ Base $NAME atteinte, ping réussi."
            else
              echo "  ❌ Aucune réponse de $NAME — la base est peut-être en pause, ou problème réseau persistant."
              FAIL=1
            fi
          done
          exit $FAIL
